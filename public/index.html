<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bitbucket → Slack webhook</title>
    <style>
      :root {
        color-scheme: light;
        --ink: #1a2332;
        --muted: #5b6b7c;
        --bg: #f3f6f9;
        --card: #ffffff;
        --accent: #0052cc;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: "IBM Plex Sans", "Segoe UI", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 12% 18%, #d9e8ff 0%, transparent 42%),
          radial-gradient(circle at 88% 12%, #ffe8d6 0%, transparent 36%),
          var(--bg);
      }
      main {
        width: min(36rem, calc(100% - 2rem));
        padding: 2rem;
        background: var(--card);
        border: 1px solid #d7e0ea;
      }
      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.5rem;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.5;
      }
      code {
        font-family: "IBM Plex Mono", ui-monospace, monospace;
        font-size: 0.9em;
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Bitbucket → Slack</h1>
      <p>
        Webhook endpoint:
        <code>/webhook</code>
        — posts to Slack when a pull request is created in
        <code>vetstoria/rnd</code>.
      </p>
    </main>
  </body>
</html>
